server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ms-usuarios
  datasource:
    url: ${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${ORACLE_USER:TIENDA_LIBROS}
    password: ${ORACLE_PASSWORD:Oracle1233}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:claveJwtCompartidaMinimo256BitsParaHS256AlgoritmoSeguridadDuoc2025}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    root: INFO
    com.duoc.tiendalibros: DEBUG
